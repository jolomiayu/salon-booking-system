<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Karrie Beauty Hub</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    h3 {
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

    button:hover {
      background: #e63956;
    }

    #msg {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>Karrie Beauty Hub 💇‍♀️🔥</h3>

  <input id="name" placeholder="Your Name">

  <select id="service">
    <option value="">Select Service</option>
    <option>Hair Styling</option>
    <option>Makeup</option>
    <option>Braiding</option>
  </select>

  <input id="date" type="date">

  <button onclick="book()">Book Appointment</button>

  <p id="msg"></p>
</div>

<script>
const API = "https://5vk6kp6mj5.execute-api.eu-west-1.amazonaws.com";

async function book() {
  const name = document.getElementById("name").value;
  const service = document.getElementById("service").value;
  const date = document.getElementById("date").value;
  const msg = document.getElementById("msg");

  // validation
  if (!name || !service || !date) {
    msg.innerText = "❌ Please fill all fields";
    msg.style.color = "red";
    return;
  }

  msg.innerText = "⏳ Booking...";
  msg.style.color = "black";

  try {
    const res = await fetch(API + "/book", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, service, date })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = "❌ " + (data.message || "Booking failed");
      msg.style.color = "red";
      return;
    }

    msg.innerText = "✅ Booking successful!";
    msg.style.color = "green";

    // clear form
    document.getElementById("name").value = "";
    document.getElementById("service").value = "";
    document.getElementById("date").value = "";

  } catch (err) {
    console.error(err);
    msg.innerText = "❌ Network error";
    msg.style.color = "red";
  }
}
</script>

</body>
</html>
