<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    #loading {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

    #message {
      text-align: center;
      color: green;
      margin-top: 10px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #ff4d6d;
      color: white;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<h2>Bookings Dashboard 📋</h2>

<p id="loading">Loading bookings...</p>
<p id="message"></p>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Service</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const API_BASE = "https://5vk6kp6mj5.execute-api.eu-west-1.amazonaws.com";

async function loadBookings() {
  const loading = document.getElementById("loading");
  const tableBody = document.getElementById("tableBody");

  loading.style.display = "block";

  try {
    const res = await fetch(API_BASE + "/bookings");
    const data = await res.json();

    tableBody.innerHTML = "";

    data.forEach(function(item) {
      const row = document.createElement("tr");

      row.innerHTML =
        "<td>" + (item.name || "") + "</td>" +
        "<td>" + (item.service || "") + "</td>" +
        "<td>" + (item.date || "") + "</td>" +
        "<td><button>Delete</button></td>";

      row.querySelector("button").addEventListener("click", function() {
        deleteBooking(item.bookingId);
      });

      tableBody.appendChild(row);
    });

  } catch (err) {
    console.error("Load error:", err);
  }

  loading.style.display = "none";
}

async function deleteBooking(id) {
  if (!confirm("Are you sure you want to delete this booking?")) return;

  try {
    await fetch(API_BASE + "/booking", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ bookingId: id })
    });

    document.getElementById("message").innerText = "✅ Booking deleted successfully";

    loadBookings();

  } catch (err) {
    console.error("Delete error:", err);
  }
}

loadBookings();
</script>

</body>
</html>
